<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wrong Answers Only</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --red: #E24B4A; --red-bg: #FCEBEB; --red-text: #A32D2D;
      --bg: #f9f8f6; --card: #ffffff; --surface: #f2f0ed;
      --text: #1a1a18; --muted: #6b6a66;
      --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
      --r: 10px; --rl: 14px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a18; --card: #242422; --surface: #2c2c2a;
        --text: #f0ede8; --muted: #888780;
        --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
        --red-bg: #3d1515; --red-text: #f09595;
      }
    }
    body { font-family: 'Syne', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 2rem 1rem; }
    .wrap { max-width: 620px; margin: 0 auto; }
    .logo { text-align: center; margin-bottom: 2rem; }
    .logo h1 { font-size: 38px; font-weight: 800; letter-spacing: -1.5px; }
    .logo h1 span { color: var(--red); }
    .logo p { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); margin-top: 6px; letter-spacing: 1.5px; text-transform: uppercase; }
    .stats { display: flex; gap: 10px; justify-content: center; margin-bottom: 2rem; }
    .stat { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); padding: 10px 20px; text-align: center; min-width: 90px; }
    .stat-n { font-size: 26px; font-weight: 700; line-height: 1; }
    .stat-l { font-size: 10px; color: var(--muted); margin-top: 3px; text-transform: uppercase; letter-spacing: 1px; }
    .setup { margin-bottom: 1.5rem; }
    .row { display: flex; gap: 8px; margin-bottom: 12px; }
    input[type=text] { flex: 1; padding: 12px 16px; font-family: 'Syne', sans-serif; font-size: 15px; border: 1px solid var(--border2); border-radius: var(--r); background: var(--card); color: var(--text); outline: none; transition: border-color .15s; }
    input[type=text]:focus { border-color: var(--red); }
    input[type=text]::placeholder { color: var(--muted); }
    .btn-red { padding: 12px 22px; background: var(--red); color: #fff; border: none; border-radius: var(--r); font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; white-space: nowrap; transition: opacity .15s; }
    .btn-red:hover { opacity: .88; }
    .btn-red:disabled { opacity: .45; cursor: not-allowed; }
    .btn-out { padding: 12px 22px; background: transparent; color: var(--text); border: 1px solid var(--border2); border-radius: var(--r); font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; transition: all .15s; }
    .btn-out:hover { border-color: var(--red); color: var(--red); }
    .chips { display: flex; gap: 8px; flex-wrap: wrap; }
    .chip { padding: 6px 14px; border: 1px solid var(--border); border-radius: 99px; font-size: 13px; font-family: 'Syne', sans-serif; background: var(--surface); color: var(--muted); cursor: pointer; transition: all .15s; }
    .chip:hover { border-color: var(--red); color: var(--red); }
    .loading { text-align: center; padding: 4rem 0; }
    .spin { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--red); border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 14px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .load-msg { font-family: 'Space Mono', monospace; font-size: 12px; color: var(--muted); }
    .err { background: var(--red-bg); color: var(--red-text); border-radius: var(--r); padding: 14px 18px; font-size: 14px; margin-bottom: 1rem; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--rl); padding: 1.5rem; }
    .topic-tag { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); margin-bottom: 1.25rem; text-transform: uppercase; letter-spacing: .5px; }
    .topic-tag b { color: var(--red); font-weight: 500; }
    .question { font-size: 20px; font-weight: 700; line-height: 1.4; margin-bottom: 6px; }
    .hint { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); margin-bottom: 1.5rem; }
    .answers { display: grid; gap: 8px; }
    .ans { width: 100%; text-align: left; padding: 13px 16px; border: 1px solid var(--border); border-radius: var(--r); background: var(--surface); color: var(--text); cursor: pointer; font-family: 'Syne', sans-serif; font-size: 14px; transition: all .15s; display: flex; align-items: center; gap: 12px; }
    .ans:hover:not(:disabled) { border-color: var(--red); background: var(--card); }
    .ans:disabled { cursor: default; }
    .ans.picked { border-color: var(--red); background: var(--red-bg); color: var(--red-text); font-weight: 700; }
    .ans.faded { opacity: .38; }
    .lbl { width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--border); background: var(--card); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
    .ans.picked .lbl { background: var(--red); color: #fff; border-color: var(--red); }
    .expl { border-left: 3px solid var(--red); border-radius: 0 var(--r) var(--r) 0; padding: 13px 16px; margin-top: 1.25rem; font-size: 14px; line-height: 1.65; background: var(--surface); }
    .expl b { color: var(--red); }
    .btns { display: flex; gap: 8px; margin-top: 1.25rem; flex-wrap: wrap; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <h1>Wrong <span>Answers</span> Only</h1>
    <p>Every answer is incorrect. That's the whole point.</p>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-n" id="sc">0</div><div class="stat-l">Score</div></div>
    <div class="stat"><div class="stat-n" id="sk">0</div><div class="stat-l">Streak</div></div>
    <div class="stat"><div class="stat-n" id="sp">0</div><div class="stat-l">Played</div></div>
  </div>

  <div id="v-setup" class="setup">
    <div class="row">
      <input type="text" id="t-inp" placeholder="Type any topic — space, cooking, history..." />
      <button class="btn-red" onclick="startGame()">Generate ↗</button>
    </div>
    <div class="chips">
      <span class="chip" onclick="qt('Ancient Rome')">Ancient Rome</span>
      <span class="chip" onclick="qt('Space')">Space</span>
      <span class="chip" onclick="qt('Cooking')">Cooking</span>
      <span class="chip" onclick="qt('Dinosaurs')">Dinosaurs</span>
      <span class="chip" onclick="qt('Football')">Football</span>
      <span class="chip" onclick="qt('Shakespeare')">Shakespeare</span>
      <span class="chip" onclick="qt('The Ocean')">The Ocean</span>
      <span class="chip" onclick="qt('Quantum Physics')">Quantum Physics</span>
    </div>
  </div>

  <div id="v-loading" style="display:none">
    <div class="loading">
      <div class="spin"></div>
      <div class="load-msg" id="load-msg">Consulting the Bureau of Wrong Facts...</div>
    </div>
  </div>

  <div id="v-err" style="display:none"></div>

  <div id="v-game" style="display:none">
    <div class="card">
      <div class="topic-tag">Topic: <b id="g-topic"></b></div>
      <div class="question" id="g-q"></div>
      <div class="hint">Pick your favourite wrong answer below</div>
      <div class="answers" id="g-ans"></div>
      <div class="expl" id="g-expl" style="display:none"></div>
      <div class="btns" id="g-btns" style="display:none">
        <button class="btn-red" onclick="nextQ()">Next question ↗</button>
        <button class="btn-out" onclick="changeTopic()">Change topic</button>
      </div>
    </div>
  </div>
</div>

<script>
const API_KEY = "AQ.Ab8RN6JWyAOJUj4bhd4USBs6dJxaaK9xPALJZ6a8CzmW7vmAmg";

const MSGS = [
  "Consulting the Bureau of Wrong Facts...",
  "Fabricating plausible nonsense...",
  "Cross-referencing the Incorrect Encyclopedia...",
  "Asking the least reliable expert...",
  "Generating certified misinformation..."
];

let score = 0, streak = 0, played = 0, topic = "", answered = false;

function loadStats() {
  try {
    const s = JSON.parse(localStorage.getItem("wao") || "{}");
    score = s.score || 0; streak = s.streak || 0; played = s.played || 0;
  } catch(e) {}
  showStats();
}

function saveStats() {
  try { localStorage.setItem("wao", JSON.stringify({score, streak, played})); } catch(e) {}
}

function showStats() {
  document.getElementById("sc").textContent = score;
  document.getElementById("sk").textContent = streak >= 3 ? streak + " 🔥" : streak;
  document.getElementById("sp").textContent = played;
}

function show(id) {
  ["v-setup","v-loading","v-game","v-err"].forEach(v =>
    document.getElementById(v).style.display = v === id ? "block" : "none");
}

function showAlso(id) {
  document.getElementById(id).style.display = "block";
}

function qt(t) { document.getElementById("t-inp").value = t; startGame(); }
function changeTopic() { show("v-setup"); }
function nextQ() { fetchQ(topic); }

function startGame() {
  const t = document.getElementById("t-inp").value.trim();
  if (!t) { document.getElementById("t-inp").focus(); return; }
  topic = t;
  fetchQ(t);
}

async function fetchQ(t) {
  show("v-loading");
  answered = false;
  let mi = 0;
  const lel = document.getElementById("load-msg");
  const iv = setInterval(() => { lel.textContent = MSGS[mi++ % MSGS.length]; }, 1800);

  const prompt = `You are the host of "Wrong Answers Only" — a quiz where EVERY answer is wrong. No correct answer exists anywhere.

Topic: ${t}

Rules:
1. Ask a real factual question about the topic
2. Give EXACTLY 4 answers — ALL factually wrong, the real answer must NOT appear
3. Make wrong answers plausible-sounding or funny
4. Write a witty 1-2 sentence explanation per answer for why it is wrong
5. Be funny. Remind the player all options were wrong.

Return ONLY valid JSON, no markdown, no extra text:
{"question":"...","answers":["w1","w2","w3","w4"],"explanations":["e0","e1","e2","e3"]}`;

  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        contents: [{ parts: [{ text: prompt }] }],
        generationConfig: { temperature: 1, maxOutputTokens: 900 }
      })
    });
    const data = await res.json();
    clearInterval(iv);
    if (!res.ok) throw new Error(data.error?.message || "API error " + res.status);
    const txt = (data.candidates?.[0]?.content?.parts?.[0]?.text || "").replace(/```json|```/g,"").trim();
    renderQ(JSON.parse(txt), t);
  } catch(e) {
    clearInterval(iv);
    document.getElementById("v-err").innerHTML =
      `<div class="err"><b>Error:</b> ${e.message} &nbsp; <button class="btn-out" style="padding:6px 14px;font-size:13px" onclick="show('v-setup')">← Try again</button></div>`;
    show("v-err");
    showAlso("v-setup");
  }
}

function renderQ(data, t) {
  document.getElementById("g-topic").textContent = t;
  document.getElementById("g-q").textContent = data.question;
  document.getElementById("g-expl").style.display = "none";
  document.getElementById("g-btns").style.display = "none";
  const grid = document.getElementById("g-ans");
  grid.innerHTML = "";
  ["A","B","C","D"].forEach((lbl, i) => {
    const b = document.createElement("button");
    b.className = "ans";
    b.innerHTML = `<span class="lbl">${lbl}</span><span>${data.answers[i]}</span>`;
    b.onclick = () => pick(i, data.explanations[i]);
    grid.appendChild(b);
  });
  show("v-game");
}

function pick(idx, expl) {
  if (answered) return;
  answered = true;
  score++; streak++; played++;
  saveStats(); showStats();
  document.querySelectorAll(".ans").forEach((b, i) => {
    b.disabled = true;
    b.classList.add(i === idx ? "picked" : "faded");
  });
  const el = document.getElementById("g-expl");
  el.style.display = "block";
  el.innerHTML = `<b>Wrong!</b> ${expl} (All four were wrong — that's the game!)`;
  document.getElementById("g-btns").style.display = "flex";
}

document.getElementById("t-inp").addEventListener("keydown", e => { if (e.key === "Enter") startGame(); });
loadStats();
</script>
</body>
</html>
