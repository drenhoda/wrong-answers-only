<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wrong Answers Only</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono:ital@0;1&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red: #E24B4A;
      --red-light: #FCEBEB;
      --red-dark: #A32D2D;
      --bg: #f9f8f6;
      --bg-card: #ffffff;
      --bg-secondary: #f2f0ed;
      --text: #1a1a18;
      --text-muted: #6b6a66;
      --border: rgba(0,0,0,0.1);
      --border-strong: rgba(0,0,0,0.2);
      --radius: 10px;
      --radius-lg: 14px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a18;
        --bg-card: #242422;
        --bg-secondary: #2c2c2a;
        --text: #f0ede8;
        --text-muted: #888780;
        --border: rgba(255,255,255,0.1);
        --border-strong: rgba(255,255,255,0.2);
        --red-light: #3d1515;
        --red-dark: #f09595;
      }
    }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container { max-width: 640px; margin: 0 auto; }

    /* Header */
    .header { text-align: center; margin-bottom: 2.5rem; }
    .logo { font-size: 36px; font-weight: 800; letter-spacing: -1.5px; line-height: 1; }
    .logo span { color: var(--red); }
    .tagline {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 6px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    /* Stats bar */
    .stats { display: flex; gap: 10px; justify-content: center; margin-bottom: 2rem; }
    .stat {
      background: var(--bg-card);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 18px;
      text-align: center;
      min-width: 90px;
    }
    .stat-val { font-size: 24px; font-weight: 700; line-height: 1; }
    .stat-lbl { font-size: 10px; color: var(--text-muted); margin-top: 3px; text-transform: uppercase; letter-spacing: 0.8px; }

    /* Setup area */
    .setup { margin-bottom: 1.5rem; }
    .topic-row { display: flex; gap: 8px; margin-bottom: 12px; }
    .topic-input {
      flex: 1;
      padding: 12px 16px;
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      border: 1px solid var(--border-strong);
      border-radius: var(--radius);
      background: var(--bg-card);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }
    .topic-input:focus { border-color: var(--red); }
    .topic-input::placeholder { color: var(--text-muted); }

    .btn {
      padding: 12px 22px;
      background: var(--red);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      white-space: nowrap;
    }
    .btn:hover { opacity: 0.88; }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .btn-outline {
      padding: 12px 22px;
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius);
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-outline:hover { border-color: var(--red); color: var(--red); }

    /* Quick topic chips */
    .chips { display: flex; gap: 8px; flex-wrap: wrap; }
    .chip {
      padding: 6px 14px;
      border: 1px solid var(--border);
      border-radius: 99px;
      font-size: 13px;
      font-family: 'Syne', sans-serif;
      background: var(--bg-secondary);
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
    }
    .chip:hover { border-color: var(--red); color: var(--red); background: var(--bg-card); }

    /* Loading */
    .loading { text-align: center; padding: 4rem 1rem; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--red);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-msg { font-family: 'Space Mono', monospace; font-size: 12px; color: var(--text-muted); }

    /* Error */
    .error-box {
      background: var(--red-light);
      color: var(--red-dark);
      border-radius: var(--radius);
      padding: 14px 18px;
      font-size: 14px;
      margin-bottom: 1rem;
    }

    /* Game card */
    .game-card {
      background: var(--bg-card);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      margin-bottom: 1rem;
    }
    .topic-badge {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 1.25rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .topic-badge strong { color: var(--red); }
    .question { font-size: 20px; font-weight: 700; line-height: 1.4; margin-bottom: 6px; }
    .question-hint {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 1.5rem;
      letter-spacing: 0.5px;
    }

    /* Answer buttons */
    .answers { display: grid; gap: 8px; }
    .answer-btn {
      width: 100%;
      text-align: left;
      padding: 13px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg-secondary);
      color: var(--text);
      cursor: pointer;
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 400;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .answer-btn:hover:not(:disabled) { border-color: var(--red); background: var(--bg-card); }
    .answer-btn:disabled { cursor: default; }
    .answer-btn.picked { border-color: var(--red); background: var(--red-light); color: var(--red-dark); font-weight: 700; }
    .answer-btn.not-picked { opacity: 0.4; }

    .answer-label {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--bg-card);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700;
      flex-shrink: 0;
    }
    .answer-btn.picked .answer-label { background: var(--red); color: #fff; border-color: var(--red); }

    /* Explanation */
    .explanation {
      background: var(--bg-secondary);
      border-left: 3px solid var(--red);
      border-radius: 0 var(--radius) var(--radius) 0;
      padding: 14px 16px;
      margin-top: 1.25rem;
      font-size: 14px;
      line-height: 1.65;
    }
    .explanation strong { color: var(--red); }

    .next-row { display: flex; gap: 8px; margin-top: 1.25rem; flex-wrap: wrap; }

    /* Responsive */
    @media (max-width: 480px) {
      .logo { font-size: 28px; }
      .stats { gap: 8px; }
      .stat { min-width: 70px; padding: 8px 12px; }
      .stat-val { font-size: 20px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">Wrong <span>Answers</span> Only</div>
      <div class="tagline">Every answer is incorrect. That's the whole point.</div>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-val" id="stat-score">0</div>
        <div class="stat-lbl">Score</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="stat-streak">0</div>
        <div class="stat-lbl">Streak 🔥</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="stat-played">0</div>
        <div class="stat-lbl">Played</div>
      </div>
    </div>

    <div id="view-setup" class="setup">
      <div class="topic-row">
        <input type="text" class="topic-input" id="topic-input" placeholder="Enter a topic (e.g. space, cooking, history)..." />
        <button class="btn" id="gen-btn" onclick="startGame()">Generate ↗</button>
      </div>
      <div class="chips">
        <span class="chip" onclick="quickTopic('Ancient Rome')">Ancient Rome</span>
        <span class="chip" onclick="quickTopic('Quantum Physics')">Quantum Physics</span>
        <span class="chip" onclick="quickTopic('Cooking')">Cooking</span>
        <span class="chip" onclick="quickTopic('Dinosaurs')">Dinosaurs</span>
        <span class="chip" onclick="quickTopic('The Ocean')">The Ocean</span>
        <span class="chip" onclick="quickTopic('Shakespeare')">Shakespeare</span>
        <span class="chip" onclick="quickTopic('Football')">Football</span>
        <span class="chip" onclick="quickTopic('The Moon')">The Moon</span>
      </div>
    </div>

    <div id="view-error" style="display:none"></div>

    <div id="view-loading" style="display:none">
      <div class="loading">
        <div class="spinner"></div>
        <div class="loading-msg" id="loading-msg">Consulting the Bureau of Wrong Facts...</div>
      </div>
    </div>

    <div id="view-game" style="display:none">
      <div class="game-card">
        <div class="topic-badge">Topic: <strong id="topic-display"></strong></div>
        <div class="question" id="question-text"></div>
        <div class="question-hint">Pick your favourite wrong answer below</div>
        <div class="answers" id="answers-grid"></div>
        <div class="explanation" id="explanation" style="display:none"></div>
        <div class="next-row" id="next-row" style="display:none">
          <button class="btn" onclick="nextQuestion()">Next question ↗</button>
          <button class="btn-outline" onclick="changeTopic()">Change topic</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const LABELS = ['A', 'B', 'C', 'D'];
    const LOAD_MSGS = [
      "Consulting the Bureau of Wrong Facts...",
      "Fabricating plausible nonsense...",
      "Cross-referencing the Incorrect Encyclopedia...",
      "Asking the least reliable expert available...",
      "Generating certified misinformation..."
    ];

    let state = { score: 0, streak: 0, played: 0, currentTopic: '', pickedIdx: null };

    function loadStats() {
      try {
        const s = JSON.parse(localStorage.getItem('wao_stats') || '{}');
        state.score = s.score || 0;
        state.streak = s.streak || 0;
        state.played = s.played || 0;
      } catch (e) { }
      updateStats();
    }

    function saveStats() {
      try {
        localStorage.setItem('wao_stats', JSON.stringify({ score: state.score, streak: state.streak, played: state.played }));
      } catch (e) { }
    }

    function updateStats() {
      document.getElementById('stat-score').textContent = state.score;
      document.getElementById('stat-streak').textContent = state.streak + (state.streak >= 3 ? ' 🔥' : '');
      document.getElementById('stat-played').textContent = state.played;
    }

    function show(id) {
      ['view-setup', 'view-loading', 'view-game', 'view-error'].forEach(v => {
        document.getElementById(v).style.display = v === id ? 'block' : 'none';
      });
    }

    function quickTopic(t) {
      document.getElementById('topic-input').value = t;
      startGame();
    }

    function changeTopic() {
      show('view-setup');
      document.getElementById('topic-input').focus();
    }

    async function startGame() {
      const topic = document.getElementById('topic-input').value.trim();
      if (!topic) { document.getElementById('topic-input').focus(); return; }
      state.currentTopic = topic;
      await fetchQuestion(topic);
    }

    async function nextQuestion() {
      await fetchQuestion(state.currentTopic);
    }

    async function fetchQuestion(topic) {
      show('view-loading');
      let mi = 0;
      const loadEl = document.getElementById('loading-msg');
      const interval = setInterval(() => { loadEl.textContent = LOAD_MSGS[mi++ % LOAD_MSGS.length]; }, 1800);

      const prompt = `You are the host of "Wrong Answers Only" — a hilarious quiz game where EVERY answer is deliberately incorrect. There is NO correct answer; all four choices must be factually wrong.

Generate a quiz question about: ${topic}

Rules:
1. Ask a genuine factual question about the topic (something that has a real, well-known correct answer)
2. Provide EXACTLY 4 answers that are ALL wrong — the real correct answer must NOT appear
3. Make the wrong answers plausible-sounding, funny, or absurd — but factually incorrect
4. For each answer, write a witty 1-2 sentence explanation of why THAT specific answer is wrong
5. The explanation should be funny, reference the chosen answer, and remind the player all answers were wrong

Respond ONLY with valid JSON, no markdown fences, no extra text:
{
  "question": "string",
  "answers": ["wrong answer 1", "wrong answer 2", "wrong answer 3", "wrong answer 4"],
  "explanations": [
    "witty explanation for why answer[0] is wrong",
    "witty explanation for why answer[1] is wrong",
    "witty explanation for why answer[2] is wrong",
    "witty explanation for why answer[3] is wrong"
  ]
}`;

      try {
        const res = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            model: "claude-sonnet-4-20250514",
            max_tokens: 1000,
            messages: [{ role: "user", content: prompt }]
          })
        });
        const data = await res.json();
        clearInterval(interval);
        if (!res.ok) throw new Error(data.error?.message || `API error ${res.status}`);
        const text = data.content.map(c => c.text || '').join('').replace(/```json|```/g, '').trim();
        const parsed = JSON.parse(text);
        showQuestion(parsed, topic);
      } catch (e) {
        clearInterval(interval);
        const errEl = document.getElementById('view-error');
        errEl.innerHTML = `<div class="error-box"><strong>Oops!</strong> ${e.message}<br><br><button class="btn-outline" onclick="changeTopic()">← Try again</button></div>`;
        show('view-error');
        document.getElementById('view-setup').style.display = 'block';
      }
    }

    function showQuestion(data, topic) {
      state.pickedIdx = null;
      document.getElementById('topic-display').textContent = topic;
      document.getElementById('question-text').textContent = data.question;
      document.getElementById('explanation').style.display = 'none';
      document.getElementById('next-row').style.display = 'none';

      const grid = document.getElementById('answers-grid');
      grid.innerHTML = '';
      data.answers.forEach((ans, i) => {
        const btn = document.createElement('button');
        btn.className = 'answer-btn';
        btn.innerHTML = `<span class="answer-label">${LABELS[i]}</span><span>${ans}</span>`;
        btn.onclick = () => pickAnswer(i, data.explanations[i]);
        grid.appendChild(btn);
      });

      show('view-game');
    }

    function pickAnswer(idx, explanation) {
      if (state.pickedIdx !== null) return;
      state.pickedIdx = idx;
      state.score += 1;
      state.streak += 1;
      state.played += 1;
      saveStats();
      updateStats();

      document.querySelectorAll('.answer-btn').forEach((btn, i) => {
        btn.disabled = true;
        btn.classList.add(i === idx ? 'picked' : 'not-picked');
      });

      const expEl = document.getElementById('explanation');
      expEl.style.display = 'block';
      expEl.innerHTML = `<strong>Wrong!</strong> ${explanation} (All four answers were wrong — that's the game!)`;
      document.getElementById('next-row').style.display = 'flex';
    }

    // Handle Enter key in topic input
    document.getElementById('topic-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') startGame();
    });

    loadStats();
  </script>
</body>
</html>
